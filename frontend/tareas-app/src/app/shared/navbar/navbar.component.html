<!-- 
  Navbar principal de la aplicación
  - bg-dark: fondo oscuro
  - navbar-expand-lg: se colapsa en pantallas menores a 992px
-->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    
    <!-- Logo / Marca de la aplicación -->
    <a class="navbar-brand" routerLink="/dashboard">EduTech</a>
    
    <!-- 
      Botón hamburguesa para dispositivos móviles
      - navbar-toggler: estilos del botón
      - data-bs-toggle="collapse": indica que controla un elemento colapsable
      - data-bs-target="#navbarNav": el ID del elemento que colapsa
      - aria-expanded: estado actual (false = colapsado)
    -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" 
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    
    <!-- 
      Menú colapsable
      - collapse: oculto por defecto en móvil
      - navbar-collapse: estilos del contenedor
      - id="navbarNav": identificador para el botón hamburguesa
    -->
    <div class="collapse navbar-collapse" id="navbarNav">
      
      <!-- 
        Lista de enlaces de navegación
        - ms-auto: margen izquierdo automático (empuja a la derecha)
      -->
      <ul class="navbar-nav ms-auto">
        
        <!-- Enlace al Dashboard -->
        <li class="nav-item">
          <a class="nav-link" routerLink="/dashboard" routerLinkActive="active">
            <i class="bi bi-speedometer2"></i> Inicio
          </a>
        </li>
        
        <!-- Enlace a la lista de Tareas -->
        <li class="nav-item">
          <a class="nav-link" routerLink="/tareas" routerLinkActive="active">
            <i class="bi bi-list-task"></i> Tareas
          </a>
        </li>
        
        <!-- Enlace al Perfil de usuario -->
        <li class="nav-item">
          <a class="nav-link" routerLink="/perfil" routerLinkActive="active">
            <i class="bi bi-person"></i> Perfil
          </a>
        </li>
        
        <!-- Botón de Cerrar Sesión -->
        <li class="nav-item">
          <button class="btn btn-outline-light btn-sm" (click)="logout()">
            <i class="bi bi-box-arrow-right"></i> Salir
          </button>
        </li>
        
      </ul>
    </div>
  </div>
</nav>
